name: Update GeBIZ awards data

on:
  schedule:
    - cron: '0 0 * * 1'   # 08:00 SGT every Monday
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run updater
        run: |
          mkdir -p data
          python3 update_awards.py

      - name: Commit if changed
        run: |
          git config user.name "gebiz-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/awards.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "data: awards update $(TZ=Asia/Singapore date +%F)"
            git push
          fi
